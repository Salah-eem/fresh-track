services:
  - type: web
    name: freshtrack-backend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: freshtrack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: freshtrack-db
    plan: free
