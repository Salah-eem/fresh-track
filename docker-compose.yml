version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: freshtrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: freshtrack
      POSTGRES_PASSWORD: freshtrack_secret
      POSTGRES_DB: freshtrack
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
